<!DOCTYPE html>
<html>
<head>
    <title>Personal Page & Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Muthu Parkavi</h1>
    <p>CSE Student | Web Developer</p>
    <p>Email: parkavi@email.com</p>
</header>

<nav>
    <button onclick="showSection('resume')">Resume</button>
    <button onclick="showSection('products')">Products</button>
    <button onclick="showSection('cart')">Cart</button>
    <button onclick="showSection('orders')">Track Order</button>
</nav>

<!-- Resume Section -->
<section id="resume" class="section">
    <h2>About Me</h2>
    <p>Passionate Computer Science student with interest in Web Development.</p>

    <h3>Skills</h3>
    <ul>
        <li>C++</li>
        <li>HTML, CSS, JavaScript</li>
        <li>Problem Solving</li>
    </ul>
</section>

<!-- Products Section -->
<section id="products" class="section" style="display:none;">
    <h2>Products</h2>
    <div id="product-list"></div>
</section>

<!-- Cart Section -->
<section id="cart" class="section" style="display:none;">
    <h2>Shopping Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button onclick="placeOrder()">Place Order</button>
</section>

<!-- Order Tracking -->
<section id="orders" class="section" style="display:none;">
    <h2>Track Order</h2>
    <input type="email" id="trackEmail" placeholder="Enter Email">
    <button onclick="trackOrder()">Track</button>
    <p id="orderStatus"></p>
</section>

<script src="script.js"></script>
</body>
</html>
